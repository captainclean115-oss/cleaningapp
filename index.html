<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>My Clients</title>

<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f5;
  --muted: #8b8fa8;
  --accent: #6c8fff;
  --accent2: #a78bfa;
  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;
  --teal: #2dd4bf;
  --radius: 14px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100svh;
  overflow-x: hidden;
}

/* ── TOP BAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,17,23,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: calc(var(--safe-top) + 14px) 16px 14px;
  border-bottom: 1px solid var(--border);
}
.topbar-inner { display: flex; align-items: center; gap: 10px; max-width: 600px; margin: 0 auto; }
.app-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; flex: 1; }
.app-title span { color: var(--accent); }
.badge-count { background: var(--accent); color: #fff; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 20px; font-family: 'DM Mono', monospace; }

/* ── SEARCH ── */
.search-wrap { padding: 12px 16px; background: var(--bg); position: sticky; top: calc(var(--safe-top) + 58px); z-index: 99; }
.search-inner { max-width: 600px; margin: 0 auto; display: flex; gap: 8px; }
.search-box { position: relative; flex: 1; }
.search-box input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 11px 14px 11px 38px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
  outline: none; transition: border-color .15s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }
.filter-btn {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 11px 14px; color: var(--muted); font-size: 13px; font-family: 'DM Sans', sans-serif;
  cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px; transition: all .15s;
}
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(108,143,255,0.1); }

/* ── FILTER ROW ── */
.filter-row { padding: 0 16px 12px; display: none; }
.filter-row.open { display: block; }
.filter-scroll { max-width: 600px; margin: 0 auto; display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 13px; font-size: 12px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.chip.on { background: rgba(108,143,255,0.15); border-color: var(--accent); color: var(--accent); }

/* ── STATS BAR ── */
.stats-bar { padding: 0 16px 12px; }
.stats-inner { max-width: 600px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
.stat-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
.stat-value { font-size: 18px; font-weight: 600; font-family: 'DM Mono', monospace; letter-spacing: -0.5px; }
.stat-value.red { color: var(--red); }
.stat-value.green { color: var(--green); }
.stat-value.amber { color: var(--amber); }

/* ── CLIENT LIST ── */
.list-wrap { padding: 0 16px; }
.list-inner { max-width: 600px; margin: 0 auto; }
.section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; padding: 8px 0 6px; }

.client-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 8px;
  cursor: pointer; transition: all .15s; active: opacity(.8);
}
.client-card:active { opacity: .7; transform: scale(.99); }
.client-card.expanded { border-color: var(--border2); }
.card-top { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; letter-spacing: -0.3px;
}
.card-main { flex: 1; min-width: 0; }
.card-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-sub { font-size: 12px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.freq-pill { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
.bal-pill { font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; }

/* ── EXPANDED CARD ── */
.card-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
.client-card.expanded .card-detail { display: block; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.detail-item .d-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
.detail-item .d-val { font-size: 13px; font-weight: 500; }
.notes-bar { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25); border-radius: var(--radius-sm); padding: 8px 10px; margin-bottom: 10px; font-size: 12px; color: var(--amber); display: flex; gap: 6px; align-items: flex-start; }
.action-row { display: flex; gap: 8px; }
.action-btn {
  flex: 1; padding: 10px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.btn-call { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
.btn-sms { background: rgba(108,143,255,0.15); color: var(--accent); border: 1px solid rgba(108,143,255,0.3); }
.btn-msg { background: rgba(167,139,250,0.15); color: var(--accent2); border: 1px solid rgba(167,139,250,0.3); flex: 2; }
.btn-email { background: rgba(45,212,191,0.15); color: var(--teal); border: 1px solid rgba(45,212,191,0.3); }
.action-btn:active { opacity: .7; transform: scale(.97); }

/* ── FREQ COLORS ── */
.f-wek { background: rgba(52,211,153,0.12); color: var(--green); }
.f-etw { background: rgba(108,143,255,0.12); color: var(--accent); }
.f-eow { background: rgba(167,139,250,0.12); color: var(--accent2); }
.f-efw { background: rgba(251,191,36,0.12); color: var(--amber); }
.f-mon { background: rgba(139,143,168,0.12); color: var(--muted); }
.f-oms { background: rgba(248,113,113,0.12); color: var(--red); }

/* ── AVATAR COLORS ── */
.av0 { background: rgba(108,143,255,0.2); color: var(--accent); }
.av1 { background: rgba(167,139,250,0.2); color: var(--accent2); }
.av2 { background: rgba(52,211,153,0.2); color: var(--green); }
.av3 { background: rgba(251,191,36,0.2); color: var(--amber); }
.av4 { background: rgba(45,212,191,0.2); color: var(--teal); }

/* ── EMPTY ── */
.empty { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty-text { font-size: 15px; }

/* ── BOTTOM PADDING ── */
.bottom-pad { height: calc(var(--safe-bottom) + 24px); }

/* ── DRAWER (message composer) ── */
.drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; backdrop-filter: blur(4px); }
.drawer-backdrop.open { display: block; }
.drawer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
  background: var(--surface); border-top: 1px solid var(--border2);
  border-radius: 20px 20px 0 0; padding: 0 0 calc(var(--safe-bottom) + 20px);
  transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
  max-height: 85svh; overflow-y: auto;
}
.drawer.open { transform: translateY(0); }
.drawer-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 0; }
.drawer-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
.drawer-title { font-size: 16px; font-weight: 600; }
.drawer-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
.msg-types { display: flex; gap: 8px; padding: 14px 20px; overflow-x: auto; scrollbar-width: none; }
.msg-types::-webkit-scrollbar { display: none; }
.msg-type {
  flex-shrink: 0; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s;
}
.msg-type.on { background: rgba(108,143,255,0.15); border-color: var(--accent); color: var(--accent); }
.msg-preview { margin: 0 20px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; min-height: 120px; font-size: 14px; line-height: 1.6; color: var(--muted); font-style: italic; }
.msg-preview.loaded { color: var(--text); font-style: normal; }
.msg-actions { display: flex; gap: 8px; padding: 14px 20px 0; }
.msg-send { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity .15s; }
.msg-send:active { opacity: .8; }
.msg-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 18px; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; }

/* ── INSTALL BANNER ── */
.install-banner {
  margin: 0 16px 10px; max-width: 600px; margin-left: auto; margin-right: auto;
  background: rgba(108,143,255,0.1); border: 1px solid rgba(108,143,255,0.25);
  border-radius: var(--radius); padding: 10px 14px;
  font-size: 12px; color: var(--accent); display: flex; align-items: center; gap: 8px;
}
.install-banner button { margin-left: auto; background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; }
</style>

const FREQ_CLASS = {'RMS - WEK':'f-wek','RMS - ETW':'f-etw','RMS - EOW':'f-eow','RMS - EFW':'f-efw','RMS - MON':'f-mon','OMS':'f-oms'};
const FREQ_LABEL = {'RMS - WEK':'Weekly','RMS - ETW':'Every 3wk','RMS - EOW':'Every 2wk','RMS - EFW':'Monthly+','RMS - MON':'Monthly','OMS':'One-time'};
const AV_COLORS = ['av0','av1','av2','av3','av4'];

let filtered = [...CLIENTS];
let expandedId = null;
let activeFilters = new Set();
let searchVal = '';
let drawerClient = null;
let drawerType = null;

function initials(fn, ln) {
  return ((fn||'')[0]||'') + ((ln||'')[0]||'');
}

function avClass(id) {
  return AV_COLORS[parseInt(id.slice(-1)) % 5];
}

function parseDate(s) {
  if (!s) return 0;
  const p = s.split('/');
  return p.length === 3 ? new Date(+p[2], +p[0]-1, +p[1]).getTime() : 0;
}

function daysUntil(s) {
  const d = parseDate(s);
  if (!d) return null;
  return Math.round((d - Date.now()) / 86400000);
}

function cleanName(c) {
  return (c.fn + ' ' + c.ln).replace(/\s+/g,' ').trim();
}

function buildFilters() {
  const zones = [...new Set(CLIENTS.map(c=>c.zone).filter(Boolean))].sort();
  const freqs = ['Weekly','Every 2wk','Every 3wk','Monthly+','Monthly'];
  const chips = document.getElementById('filter-chips');
  
  const special = [
    {id:'bal', label:'Balance due'},
    {id:'soon', label:'Due this week'},
    {id:'note', label:'Has special notes'},
  ];
  
  [...special].forEach(f => {
    const el = document.createElement('div');
    el.className = 'chip';
    el.textContent = f.label;
    el.dataset.filter = f.id;
    el.onclick = () => toggleChip(el, f.id);
    chips.appendChild(el);
  });

  freqs.forEach(f => {
    const el = document.createElement('div');
    el.className = 'chip';
    el.textContent = f;
    el.dataset.filter = 'freq:' + f;
    el.onclick = () => toggleChip(el, 'freq:' + f);
    chips.appendChild(el);
  });

  zones.slice(0, 12).forEach(z => {
    const el = document.createElement('div');
    el.className = 'chip';
    el.textContent = z.replace(/^\d+ - /,'');
    el.dataset.filter = 'zone:' + z;
    el.onclick = () => toggleChip(el, 'zone:' + z);
    chips.appendChild(el);
  });
}

function toggleChip(el, id) {
  if (activeFilters.has(id)) { activeFilters.delete(id); el.classList.remove('on'); }
  else { activeFilters.add(id); el.classList.add('on'); }
  applyFilters();
}

function toggleFilters() {
  const row = document.getElementById('filter-row');
  const btn = document.getElementById('filter-toggle');
  row.classList.toggle('open');
  btn.classList.toggle('active', row.classList.contains('open'));
}

function applyFilters() {
  const q = searchVal.toLowerCase();
  filtered = CLIENTS.filter(c => {
    const name = cleanName(c).toLowerCase();
    if (q && !name.includes(q) && !c.city.toLowerCase().includes(q) && !c.ph.includes(q) && !c.addr.toLowerCase().includes(q)) return false;
    for (const f of activeFilters) {
      if (f === 'bal' && c.bal <= 0) return false;
      if (f === 'soon') {
        const d = daysUntil(c.next);
        if (d === null || d < 0 || d > 7) return false;
      }
      if (f === 'note' && !c.notes) return false;
      if (f.startsWith('freq:')) {
        const fl = f.slice(5);
        const cl = FREQ_LABEL[c.fc] || c.freq;
        if (cl !== fl) return false;
      }
      if (f.startsWith('zone:') && c.zone !== f.slice(5)) return false;
    }
    return true;
  });
  render();
}

function render() {
  document.getElementById('total-badge').textContent = filtered.length;

  const balDue = filtered.filter(c=>c.bal>0).reduce((s,c)=>s+c.bal,0);
  const soon = filtered.filter(c=>{ const d=daysUntil(c.next); return d!==null&&d>=0&&d<=7; }).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-label">Clients</div><div class="stat-value">${filtered.length}</div></div>
    <div class="stat-card"><div class="stat-label">Outstanding</div><div class="stat-value red">$${Math.round(balDue).toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">Due this week</div><div class="stat-value amber">${soon}</div></div>`;

  const list = document.getElementById('client-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">⌕</div><div class="empty-text">No clients match</div></div>';
    return;
  }

  list.innerHTML = filtered.map(c => {
    const name = cleanName(c);
    const ini = initials(c.fn, c.ln);
    const av = avClass(c.id);
    const fc = FREQ_CLASS[c.fc] || 'f-mon';
    const fl = FREQ_LABEL[c.fc] || c.freq;
    const isExp = expandedId === c.id;
    const d = daysUntil(c.next);
    const dStr = d === null ? '' : d < 0 ? `${Math.abs(d)}d overdue` : d === 0 ? 'Today' : d === 1 ? 'Tomorrow' : `in ${d}d`;
    const balStr = c.bal > 0 ? `<span class="bal-pill" style="color:var(--red)">$${Math.round(c.bal).toLocaleString()}</span>` 
                 : c.bal < 0 ? `<span class="bal-pill" style="color:var(--muted)">Credit</span>` : '';

    let detail = '';
    if (isExp) {
      detail = `<div class="card-detail">
        ${c.notes ? `<div class="notes-bar">⚠ ${c.notes}</div>` : ''}
        <div class="detail-grid">
          <div class="detail-item"><div class="d-label">Phone</div><div class="d-val">${c.ph || '—'}</div></div>
          <div class="detail-item"><div class="d-label">Zone</div><div class="d-val" style="font-size:11px">${c.zone||'—'}</div></div>
          <div class="detail-item"><div class="d-label">Last service</div><div class="d-val">${c.last||'—'}</div></div>
          <div class="detail-item"><div class="d-label">Next service</div><div class="d-val" style="color:${d!==null&&d<0?'var(--red)':d!==null&&d<=3?'var(--amber)':'var(--text)'}">${c.next||'—'}</div></div>
          <div class="detail-item"><div class="d-label">Package</div><div class="d-val">${c.pkg||'—'}</div></div>
          <div class="detail-item"><div class="d-label">Margin</div><div class="d-val" style="font-family:'DM Mono',monospace;font-size:12px">${c.margin||'—'}</div></div>
          ${c.em ? `<div class="detail-item" style="grid-column:span 2"><div class="d-label">Email</div><div class="d-val" style="font-size:12px;word-break:break-all">${c.em}</div></div>` : ''}
        </div>
        <div class="action-row">
          ${c.ph ? `<button class="action-btn btn-call" onclick="callClient(event,'${c.ph}')">📞 Call</button>` : ''}
          ${c.ph ? `<button class="action-btn btn-sms" onclick="smsClient(event,'${c.ph}')">✉ SMS</button>` : ''}
          <button class="action-btn btn-msg" onclick="openDrawer(event,'${c.id}')">✦ Draft message</button>
        </div>
      </div>`;
    }

    return `<div class="client-card${isExp?' expanded':''}" onclick="toggleCard('${c.id}')">
      <div class="card-top">
        <div class="avatar ${av}">${ini}</div>
        <div class="card-main">
          <div class="card-name">${name}</div>
          <div class="card-sub">${c.city}${c.addr ? ' · ' + c.addr : ''}</div>
        </div>
        <div class="card-right">
          <span class="freq-pill ${fc}">${fl}</span>
          ${balStr}
          ${dStr ? `<span style="font-size:10px;color:${d!==null&&d<0?'var(--red)':d!==null&&d<=3?'var(--amber)':'var(--muted)'}">${dStr}</span>` : ''}
        </div>
      </div>
      ${detail}
    </div>`;
  }).join('');
}

function toggleCard(id) {
  expandedId = expandedId === id ? null : id;
  render();
  if (expandedId) {
    setTimeout(() => {
      const cards = document.querySelectorAll('.client-card.expanded');
      if (cards.length) cards[0].scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 50);
  }
}

function callClient(e, ph) {
  e.stopPropagation();
  window.location.href = 'tel:' + ph.replace(/\D/g,'');
}

function smsClient(e, ph) {
  e.stopPropagation();
  window.location.href = 'sms:' + ph.replace(/\D/g,'');
}

function openDrawer(e, clientId) {
  e.stopPropagation();
  drawerClient = CLIENTS.find(c => c.id === clientId);
  if (!drawerClient) return;
  
  const name = cleanName(drawerClient);
  document.getElementById('drawer-title').textContent = name;
  document.getElementById('drawer-sub').textContent = drawerClient.city + ' · ' + drawerClient.freq;

  const types = [
    { id: 'followup', label: 'Follow-up' },
    { id: 'reminder', label: 'Appointment reminder' },
    { id: 'review', label: 'Review request' },
    { id: 'balance', label: 'Balance due' },
    { id: 'checkin', label: 'Check-in' },
    { id: 'confirm', label: 'Schedule confirm' },
  ];
  
  document.getElementById('msg-types').innerHTML = types.map(t =>
    `<div class="msg-type${drawerType===t.id?' on':''}" onclick="selectMsgType('${t.id}')">${t.label}</div>`
  ).join('');
  
  document.getElementById('msg-preview').textContent = 'Select a message type above...';
  document.getElementById('msg-preview').className = 'msg-preview';
  drawerType = null;

  document.getElementById('backdrop').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

const MESSAGES = {
  followup: (c) => `Hi ${c.fn}! This is [Your Name] from [Business Name]. Just wanted to follow up and see how your last cleaning went on ${c.last||'recently'}. We'd love to keep your home looking great — your next scheduled service is ${c.next||'coming up soon'}. Any questions, just reply here! 😊`,
  reminder: (c) => `Hi ${c.fn}! Reminder that your cleaning service is scheduled for ${c.next||'soon'}. Our team will arrive ${c.notes&&c.notes.includes('9am')?'at 9am':'during your preferred window'}. Please let us know if you need to reschedule. See you then! — [Your Name]`,
  review: (c) => `Hi ${c.fn}! We hope your recent cleaning on ${c.last||'your last visit'} left your home sparkling ✨ If you have a moment, we'd really appreciate a quick Google review — it helps our small business so much! [Your Google review link]. Thank you! — [Your Name]`,
  balance: (c) => `Hi ${c.fn}, hope you're well! Just a friendly reminder that there's an outstanding balance of $${Math.round(c.bal).toLocaleString()} on your account. You can pay by [payment method] or reply here and we'll sort it out. No rush — just wanted to make sure you received this. Thanks! — [Your Name]`,
  checkin: (c) => `Hi ${c.fn}! Just checking in — it's been a little while since your last service on ${c.last||'your last visit'}. We miss you! Would you like to schedule your next cleaning? We have availability in your area. — [Your Name]`,
  confirm: (c) => `Hi ${c.fn}! Confirming your cleaning appointment for ${c.next||'your upcoming date'}. Our team will be there${c.notes&&c.notes.includes('ETA')?', and we'll give you a heads-up when we're on our way':''}. Please reply YES to confirm or let us know if you need to change anything. Thanks! — [Your Name]`,
};

function selectMsgType(type) {
  drawerType = type;
  document.querySelectorAll('.msg-type').forEach(el => el.classList.toggle('on', el.textContent.toLowerCase().includes(type==='followup'?'follow':type==='checkin'?'check':type==='balance'?'balance':type)));
  
  if (drawerClient && MESSAGES[type]) {
    const msg = MESSAGES[type](drawerClient);
    const preview = document.getElementById('msg-preview');
    preview.textContent = msg;
    preview.className = 'msg-preview loaded';
  }
}

function sendMessage() {
  if (!drawerClient || !drawerType) return;
  const msg = MESSAGES[drawerType](drawerClient);
  navigator.clipboard.writeText(msg).then(() => {
    const ph = drawerClient.ph.replace(/\D/g,'');
    closeDrawer();
    if (ph) setTimeout(() => window.location.href = 'sms:' + ph, 200);
    else alert('Message copied! Open your messaging app to send.');
  }).catch(() => {
    alert('Message ready:\n\n' + msg);
    closeDrawer();
  });
}

// Search — use multiple events for max mobile compatibility
const searchEl = document.getElementById('search');
['input','keyup','change','paste','compositionend'].forEach(evt => {
  searchEl.addEventListener(evt, function() {
    searchVal = this.value;
    expandedId = null;
    applyFilters();
  });
});

// Install banner
window.addEventListener('load', () => {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInApp = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isInApp) {
    document.getElementById('install-banner-wrap').innerHTML = `
      <div class="install-banner" style="margin:0 16px 10px;max-width:600px;display:block">
        ⬆ Add to home screen: tap the Share button, then "Add to Home Screen"
        <button onclick="this.parentElement.remove()">Got it</button>
      </div>`;
  }
});

buildFilters();
applyFilters();
</script>
</body>
</html>
